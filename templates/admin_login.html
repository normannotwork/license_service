<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход администратора</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 320px; text-align: center; }
        h2 { margin-top: 0; color: #2c3e50; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 6px; color: #7f8c8d; font-size: 13px; font-weight: 600; text-transform: uppercase;}
        input { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box; font-size: 15px;}
        input:focus { border-color: #e74c3c; outline: none; box-shadow: 0 0 0 2px rgba(231,76,60,0.2); }
        button { width: 100%; padding: 14px; background: #e74c3c; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;}
        button:hover { background: #c0392b; }
        .error { color: #e74c3c; margin-bottom: 15px; font-weight: 500; font-size: 14px; }
        .back-link { display: block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Доступ в панель</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form action="/admin/login" method="post">
            <div class="form-group">
                <label>Пароль администратора</label>
                <input type="password" name="password" required autofocus>
            </div>
            <button type="submit">Войти</button>
        </form>
        <a href="/generator" class="back-link">← Назад к генератору</a>
    </div>
</body>
</html>
