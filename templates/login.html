<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход - Лицензия NT_Programmator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #eef2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 360px; text-align: center; }
        h2 { margin-top: 0; color: #2c3e50; margin-bottom: 25px; line-height: 1.4; }
        .subtitle { display: block; font-size: 15px; color: #7f8c8d; font-weight: normal; margin-top: 5px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 6px; color: #7f8c8d; font-size: 13px; font-weight: 600; text-transform: uppercase;}
        input { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: 0.2s;}
        input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 0 2px rgba(52,152,219,0.2); }
        button { width: 100%; padding: 14px; background: #3498db; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Авторизация<span class="subtitle">Лицензия NT_Programmator</span></h2>
        <form action="/login" method="post">
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Имя *</label>
                <input type="text" name="first_name" required>
            </div>
            <div class="form-group">
                <label>Фамилия *</label>
                <input type="text" name="last_name" required>
            </div>
            <button type="submit">Войти в генератор</button>
        </form>
    </div>
</body>
</html>
